name: Integration Request
description: Request integration with an external tool (VS Code, MCP, Slack, etc.)
labels: ["integration"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool / Platform
      description: What do you want to integrate with?
      placeholder: "VS Code Extension, MCP Server, Slack Bot, Discord Webhook..."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: How should this integration work?
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to APIs, docs, or similar integrations.
