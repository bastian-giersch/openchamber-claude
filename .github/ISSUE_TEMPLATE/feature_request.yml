name: Feature Request
description: Suggest a feature for OpenChamber
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Sessions
        - Diffs
        - Workspaces
        - Settings
        - API
        - PWA
        - Other
